<!DOCTYPE html>
<html lang="es-es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchListPro</title>
    <link rel="stylesheet" href="styles/output.css">
    <link rel="stylesheet" href="styles/components.css">
</head>

<body class="page">

<a class="skip-link" href="#main">Saltar al contenido</a>

<header class="app-header">
    <div class="app-header-inner">
        <h1 class="app-title">WatchList Pro</h1>
        <p class="app-subtitle">La mejor manera de disfrutar del contenido es organizándolo.</p>
    </div>
</header>

<main id="main" class="app-shell">

    <!-- Barra lateral -->
    <aside class="sidebar">
        <div class="sidebar-head">
            <h2 class="section-title mb-0">Listas</h2>
        </div>
        <div class="sidebar-body">
            <div class="stack">
                <button class="filter-btn is-active" type="button" data-filter="all">Todas</button>
                <button class="filter-btn" type="button" data-filter="saw">Vistos</button>
                <button class="filter-btn" type="button" data-filter="to-do">Por ver</button>
                <button class="filter-btn" type="button" data-filter="saved">Guardados</button>
            </div>
        </div>
    </aside>

    <!-- Contenido principal -->
    <section class="content">
        <section class="panel panel--form" aria-label="Añadir contenido">
            <h2 class="section-title">Añadir</h2>
            <form id="item-form" class="form-grid">
                <label class="sr-only" for="item-type">Tipo</label>
                <select id="item-type" class="field" aria-label="Tipo">
                    <option value="series">Serie</option>
                    <option value="movies">Película</option>
                </select>

                <label class="sr-only" for="item-title">Título</label>
                <input id="item-title" class="field" type="text" placeholder="Título..." required>

                <label class="sr-only" for="item-genre">Categoría</label>
                <input id="item-genre" class="field" type="text" placeholder="Categoría (opcional)">

                <label class="sr-only" for="item-status">Estado</label>
                <select id="item-status" class="field" aria-label="Estado">
                    <option value="to-do">Por ver</option>
                    <option value="saved">Guardado</option>
                    <option value="saw">Visto</option>
                </select>

                <button class="btn btn-primary" type="submit">Añadir</button>
                <button id="clear-all" class="btn btn-ghost" type="button">Borrar todo</button>
            </form>
        </section>

        <div class="panels-grid">
            <section class="panel" aria-label="Series">
                <div class="panel-head">
                    <h2 class="section-title mb-0">Series</h2>
                    <div class="panel-meta" id="series-count" aria-label="Contador series">0</div>
                </div>
                <ul id="series-list" class="item-list" aria-label="Lista de series"></ul>
            </section>

            <section class="panel" aria-label="Películas">
                <div class="panel-head">
                    <h2 class="section-title mb-0">Películas</h2>
                    <div class="panel-meta" id="movies-count" aria-label="Contador películas">0</div>
                </div>
                <ul id="movies-list" class="item-list" aria-label="Lista de películas"></ul>
            </section>
        </div>
    </section>
</main>

<footer class="app-footer">
    <div class="footer-inner">
        <div class="footer-title">Publicidad</div>
        <div class="footer-text">Sección para alojar publicidad relevante al sitio web</div>
    </div>
</footer>

<script src="src/app.js" defer></script>

</body>
</html>
