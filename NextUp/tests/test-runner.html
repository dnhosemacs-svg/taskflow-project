<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NextUp · Test Runner</title>
    <style>
      :root { color-scheme: light dark; }
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 20px; }
      .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
      #report { margin-top: 16px; padding: 12px; border: 1px solid #bbb; border-radius: 8px; }
      .pass { color: #0a7a2f; }
      .fail { color: #b00020; }
      code { background: rgba(127,127,127,.15); padding: 0 4px; border-radius: 4px; }
      ul { list-style: none; padding: 0; }
      li.task-item { display: flex; gap: 8px; align-items: center; padding: 6px 8px; border: 1px solid #ccc; border-radius: 8px; margin: 6px 0; }
      button.delete-btn { border: 1px solid #ccc; background: transparent; border-radius: 999px; padding: 2px 6px; cursor: pointer; }
    </style>
  </head>
  <body>
    <h1>NextUp · Test Runner</h1>
    <p>
      Esta página carga <code>../app.js</code> con un DOM mínimo y ejecuta pruebas rápidas
      para validar que el comportamiento actual no se rompe durante el refactor.
    </p>

    <!-- DOM mínimo requerido por app.js -->
    <section class="row" aria-label="Controles NextUp">
      <input id="search" type="text" placeholder="Buscar..." />
      <form id="formulario" class="row">
        <input id="entrada" type="text" placeholder="Nueva tarea..." />
        
        <button type="submit">Añadir</button>
      </form>
    </section>

    <!-- DOM mínimo para Proyectos (nuevas funcionalidades) -->
    <section class="row" aria-label="Proyectos NextUp">
      <button id="project-add" type="button">+ Proyecto</button>
      <ul id="project-list" aria-label="Lista de proyectos (desktop)"></ul>
      <button id="project-drawer-open" type="button">Proyectos</button>
      <div id="active-project-name"></div>
      <div id="active-project-name-desktop"></div>
    </section>

    <div id="project-drawer" class="hidden">
      <div id="project-drawer-backdrop"></div>
      <button id="project-drawer-close" type="button">Cerrar</button>
      <button id="project-add-mobile" type="button">+ Proyecto</button>
      <ul id="project-list-mobile" aria-label="Lista de proyectos (mobile)"></ul>
    </div>

    <!-- Modal de proyecto (crear/renombrar) -->
    <div id="project-modal" class="hidden">
      <div id="project-modal-backdrop"></div>
      <h2 id="project-modal-title">Proyecto</h2>
      <form id="project-modal-form">
        <input id="project-modal-input" type="text" />
        <button id="project-modal-cancel" type="button">Cancelar</button>
        <button id="project-modal-submit" type="submit">Guardar</button>
      </form>
    </div>

    <!-- Modal mover tarea -->
    <div id="move-task-modal" class="hidden">
      <div id="move-task-modal-backdrop"></div>
      <div id="move-task-modal-taskname"></div>
      <div id="move-task-modal-list"></div>
      <button id="move-task-modal-cancel" type="button">Cancelar</button>
      <button id="move-task-modal-confirm" type="button">Mover</button>
    </div>
    <ul id="elemento" aria-label="Lista de tareas"></ul>
    <h2 id="completed-heading">Tareas completadas</h2>
    <ul id="completed" aria-label="Lista de tareas completadas"></ul>

    <div id="report" role="status" aria-live="polite"></div>

    <script>
      // Aislar pruebas: empezar siempre desde el mismo estado.
      localStorage.removeItem('tasks');
      localStorage.removeItem('nextup_state_v2');
    </script>
    <script src="../src/app.js?v=1"></script>
    <script src="./tests.js?v=1"></script>
  </body>
</html>
