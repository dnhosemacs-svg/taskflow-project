<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="output.css">
    <title>NextUp</title>
</head>

<!-- AÑADIMOS dark:... PARA QUE CAMBIE EL FONDO Y EL TEXTO -->
<body class="bg-[#E3F2FD] dark:bg-slate-900 text-texto dark:text-slate-100 font-sans min-h-screen flex flex-col items-center">

    <!-- HEADER CON H1 CENTRADO -->
    <header class="w-full py-6 shadow-md flex justify-center items-center">
        <h1 class="text-5xl font-serif text-primario dark:text-blue-300">NextUp</h1>
    </header>

    <!--<div class="bg-white dark:bg-black text-black dark:text-white p-10">
        TEST DARK MODE
    </div> -->

    <!-- CONTENEDOR PRINCIPAL -->
    <section class="bg-white dark:bg-slate-800 max-w-xl w-full mt-10 p-8 rounded-xl shadow-lg">

        <!-- BOTÓN DARK MODE -->
    <button
        id="theme-toggle"
        class="fixed top-4 right-4 px-3 py-1 rounded-md border-2 border-primario rounded-lg dark:border-slate-600
               bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-100
               shadow hover:bg-slate-200 dark:hover:bg-slate-700 transition z-50"
    >
        Modo oscuro
    </button>

        <!-- BUSCADOR -->
        <h2 class="text-2xl font-serif text-primario dark:text-blue-300 mb-3">Barra de búsqueda</h2>
        <input 
            type="text" 
            id="search" 
            placeholder="Buscar..."
            class="w-full px-4 py-2 border-2 border-primario rounded-lg bg-white dark:bg-slate-700 
                   text-texto dark:text-slate-100 shadow-sm focus:border-texto focus:bg-[#E3F2FD] 
                   dark:focus:bg-slate-600 transition mb-8"
        >

        <!-- AÑADIR TAREA -->
        <h2 class="text-2xl font-serif text-primario dark:text-blue-300 mb-3">Añadir tarea</h2>

        <form id="formulario" class="flex items-center gap-3 mb-8">
            <input 
                type="text" 
                id="entrada" 
                placeholder="Nueva tarea..." 
                required
                class="flex-1 px-4 py-2 border-2 border-primario rounded-lg bg-white dark:bg-slate-700 
                       text-texto dark:text-slate-100 shadow-sm focus:border-texto focus:bg-[#E3F2FD] 
                       dark:focus:bg-slate-600 transition"
            >

            <!-- BOTÓN AÑADIR (30px) -->
            <button type="submit" class="w-[30px] h-[30px] bg-primario rounded-full flex items-center justify-center shadow-md hover:bg-blue-900 transition">
                <img src="Imagenes/BotonAñadir.png" alt="Añadir" class="w-[22px] h-[22px] rounded-full">
            </button>
        </form>

        <!-- LISTA DE TAREAS -->
        <h2 class="text-2xl font-serif text-primario dark:text-blue-300 mb-3">Tareas pendientes</h2>
        <ul id="elemento" class="space-y-3"></ul>

    </section>

    <!-- SCRIPT DARK MODE -->
    <script>
        const html = document.documentElement;
        const toggleBtn = document.getElementById('theme-toggle');

        // Leer preferencia guardada
        const storedTheme = localStorage.getItem('theme');

        if (storedTheme === 'dark') {
            html.classList.add('dark');
        } else if (storedTheme === 'light') {
            html.classList.remove('dark');
        } else {
            // Si no hay preferencia, usar la del sistema
            if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                html.classList.add('dark');
            }
        }

        // Actualizar texto del botón
        function updateButtonText() {
            toggleBtn.textContent = html.classList.contains('dark')
                ? 'Modo claro'
                : 'Modo oscuro';
        }
        updateButtonText();

        // Alternar modo
        toggleBtn.addEventListener('click', () => {
            const isDark = html.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateButtonText();
        });
    </script>

    <script src="app.js"></script>
</body>
</html>
