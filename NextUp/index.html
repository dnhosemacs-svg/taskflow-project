<!DOCTYPE html>
<html lang="es" data-inline-project-rename="true">
<head>
    <!-- Metadatos básicos del documento (codificación y responsive) -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap (CDN): CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Tailwind (compilado) + estilos de la app (van después para mantener la estética actual) -->
    <link rel="stylesheet" href="styles/output.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/theme-toggle.css">

    <!-- Ajustes puntuales de layout (sin depender de Tailwind build) -->

    <!-- Título que aparece en la pestaña del navegador -->
    <title>NextUp</title>
</head>

<!--
    Estructura general
    - Usamos la clase `dark` en el elemento <html> para activar estilos "dark:" (Tailwind).
    - En <body> definimos fondo, color de texto, tipografía y layout general centrado.
-->
<body class="page">
    <a class="skip-link" href="#main">Saltar al contenido</a>

    <!-- Encabezado fijo de la app: contiene el nombre/branding -->
    <header class="app-header">
        <!-- Título principal visible -->
        <h1 class="app-title">NextUp</h1>

        <!-- Botón de tema (modo claro/oscuro) -->
        <button
            id="theme-toggle"
            class="theme-toggle-btn"
        >
            <span id="theme-toggle-text">Modo oscuro</span>
            <span
                id="theme-toggle-icon"
                data-icon="moon"
                aria-hidden="true"
            ></span>
        </button>
    </header>

    <!-- Bloque de prueba (comentado). Útil para verificar dark mode rápidamente. -->
    <!--<div class="bg-white dark:bg-black text-black dark:text-white p-10">
        TEST DARK MODE
    </div> -->

    <!-- Contenedor principal: proyectos + tareas (responsive, ancho contenido como antes) -->
    <main id="main" class="card-app">

    <!-- Layout principal: sidebar izquierda (desktop) + contenedor de tareas -->
    <div class="app-layout d-flex flex-column flex-md-row align-items-start justify-content-center">

        <!-- Contenedor de proyectos (sidebar) -->
        <section class="projects-shell">
            <aside class="sidebar-desktop">
                <div class="flex items-center justify-between gap-3 mb-3">
                    <h2 class="section-title">Proyectos</h2>
                    <button id="project-add" type="button" class="btn btn-ghost ml-1">
                        + Proyecto
                    </button>
                </div>
                <ul id="project-list" class="list-panel"></ul>
            </aside>
        </section>

        <!-- Contenedor principal: buscar, añadir y listar tareas -->
        <section class="card-app">
            <div class="tasks-shell">
                <!-- Barra superior (móvil): dropdown para cambiar proyecto + botón para gestionar (crear, renombrar, eliminar) -->
                <div class="md:hidden mb-6 project-mobile-row">
                    <label for="project-select-mobile" class="sr-only">Proyecto actual</label>
                    <select
                        id="project-select-mobile"
                        class="field project-select-mobile"
                        aria-label="Seleccionar proyecto"
                    ></select>
                    <button
                        id="project-drawer-open"
                        type="button"
                        class="icon-btn project-manage-btn"
                        aria-label="Gestionar proyectos (crear, renombrar, eliminar)"
                        title="Gestionar proyectos"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-[18px] h-[18px]" aria-hidden="true">
                            <path d="M12.854.146a.5.5 0 0 0-.707 0L10.5 1.793 14.207 5.5l1.647-1.646a.5.5 0 0 0 0-.708z"/>
                            <path d="M.5 13.5V16h2.5l7.373-7.373-2.5-2.5zM11.207 2.5l2.5 2.5-1 1-2.5-2.5z"/>
                        </svg>
                    </button>
                </div>

                <!-- Buscador: filtra tareas (la lógica suele estar en `app.js`) -->
                <section id="search-section">
                    <h2 class="section-title">Buscar</h2>
                    <label for="search-status" class="sr-only">Filtrar por estado</label>
                    <select id="search-status" class="field mb-3" aria-label="Filtrar por estado">
                        <option value="all">Todas</option>
                        <option value="pending">Pendientes</option>
                        <option value="completed">Completadas</option>
                    </select>
                    <input 
                        type="text" 
                        id="search" 
                        placeholder="Buscar..."
                        class="field mb-8"
                    >
                </section>

                <!-- Formulario para añadir una tarea nueva -->
                <h2 class="section-title">Añadir tarea</h2>
                <form id="formulario" class="mb-8">
                    <input 
                        type="text" 
                        id="entrada" 
                        placeholder="Nueva tarea..." 
                        required
                        class="field w-full"
                    >
                </form>

                <!-- Lista donde se renderizan las tareas pendientes -->
                <section id="pending-section">
                    <div class="flex items-center gap-3 mb-3">
                        <h2 id="pending-heading" class="section-title">Tareas pendientes</h2>
                    </div>
                    <ul id="elemento" class="task-list" aria-label="Tareas pendientes"></ul>
                </section>

                <!-- Completadas (solo sesión) -->
                <h2 id="completed-heading" class="section-title mt-8">Tareas completadas</h2>
                <ul id="completed" class="task-list" aria-label="Tareas completadas"></ul>
            </div>
        </section>

    </div>

    <!-- Drawer de proyectos (móvil): misma config de oscurecimiento que el resto de popups -->
    <div id="project-drawer" class="popup-root popup-root--z40 hidden">
        <div id="project-drawer-backdrop" class="popup-backdrop" aria-hidden="true"></div>
        <div class="popup-center">
            <div id="project-drawer-content" class="popup-panel">
                <div class="ui-row mb-6 w-full">
                    <h2 class="section-title mb-0">Proyectos</h2>
                    <button
                        id="project-drawer-close"
                        type="button"
                        class="ml-auto text-2xl leading-none font-semibold text-primario dark:text-blue-300 hover:opacity-80 transition"
                        aria-label="Cerrar"
                    >
                        ×
                    </button>
                </div>
                <button id="project-add-mobile" type="button" class="btn btn-ghost mb-4">
                    + Proyecto
                </button>
                <ul id="project-list-mobile" class="list-panel overflow-auto" aria-label="Lista de proyectos"></ul>
            </div>
        </div>
    </div>

    <!-- Modal centrado: crear proyecto -->
    <div id="project-modal" class="popup-root hidden">
        <div id="project-modal-backdrop" class="popup-backdrop" aria-hidden="true"></div>
        <div class="popup-center">
            <div id="project-modal-panel" class="popup-panel popup-panel--modal">
                <h2 id="project-modal-title" class="section-title mb-0">Crear proyecto</h2>
                <form id="project-modal-form" class="stack">
                    <input
                        id="project-modal-input"
                        type="text"
                        autocomplete="off"
                        placeholder="Nombre del proyecto..."
                        class="field"
                    >
                    <div class="ui-row justify-end mt-2">
                        <button id="project-modal-cancel" type="button" class="btn btn-ghost">
                            Cancelar
                        </button>
                        <button id="project-modal-submit" type="submit" class="btn btn-primary">
                            Crear
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal centrado: mover tarea -->
    <div id="move-task-modal" class="popup-root hidden">
        <div id="move-task-modal-backdrop" class="popup-backdrop" aria-hidden="true"></div>
        <div id="move-task-modal-panel" class="popup-panel popup-panel--modal">
            <h2 class="section-title mb-0">Mover tarea</h2>
            <div id="move-task-modal-taskname" class="muted-truncate">
                —
            </div>
            <div id="move-task-modal-list" class="stack modal-options-list"></div>
            <div id="move-task-modal-actions" class="ui-row justify-end">
                <button id="move-task-modal-cancel" type="button" class="btn btn-ghost">
                    Cancelar
                </button>
                <button id="move-task-modal-confirm" type="button" class="btn btn-primary">
                    Mover
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts de la app -->
    <script src="src/theme.js" defer></script>
    <script src="src/app.js" defer></script>
</body>
</html>
