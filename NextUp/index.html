<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>NextUp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <header>
        <!--Hacer clase header principal-->
        <h1>NextUp</h1>
    </header>
    <section class="position">
        <h2>Barra de búsqueda</h2>
        <input type="text" id="search" placeholder="Buscar">

        <h2>Añadir tarea</h2>
        <form id="formulario" class="contenedorForm">
            <input type="text" id="entrada" placeholder="Nueva tarea" required>
            <button type="submit">
                <img src="Imagenes/BotonAñadir.png" alt="Añadir">
            </button>
        </form>

        <h2>Tareas pendientes</h2>
        <ul id="elemento"></ul>
    </section>

    <script src="app.js"></script> 
</body>
</html>
