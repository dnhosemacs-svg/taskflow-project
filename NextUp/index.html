<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="output.css">
    <title>NextUp</title>
</head>

<body class="bg-[#E3F2FD] text-texto font-sans min-h-screen flex flex-col items-center">

    <!-- HEADER -->
    <header class="w-full py-6 shadow-md">
        <h1 class="text-center text-5xl font-serif text-primario">NextUp</h1>
    </header>

    <!-- CONTENEDOR PRINCIPAL -->
    <section class="bg-white max-w-xl w-full mt-10 p-8 rounded-xl shadow-lg">

        <!-- BUSCADOR -->
        <h2 class="text-2xl font-serif text-primario mb-3">Barra de búsqueda</h2>
        <input 
            type="text" 
            id="search" 
            placeholder="Buscar..."
            class="w-full px-4 py-2 border-2 border-primario rounded-lg bg-white text-texto shadow-sm focus:border-texto focus:bg-[#E3F2FD] transition mb-8"
        >

        <!-- AÑADIR TAREA -->
        <h2 class="text-2xl font-serif text-primario mb-3">Añadir tarea</h2>

        <form id="formulario" class="flex items-center gap-3 mb-8">
            <input 
                type="text" 
                id="entrada" 
                placeholder="Nueva tarea..." 
                required
                class="flex-1 px-4 py-2 border-2 border-primario rounded-lg bg-white text-texto shadow-sm focus:border-texto focus:bg-[#E3F2FD] transition"
            >

            <!-- BOTÓN AÑADIR (30px) -->
            <button type="submit" class="w-[30px] h-[30px] bg-primario rounded-full flex items-center justify-center shadow-md hover:bg-blue-900 transition">
                <img src="Imagenes/BotonAñadir.png" alt="Añadir" class="w-[22px] h-[22px] rounded-full">
            </button>
        </form>

        <!-- LISTA DE TAREAS -->
        <h2 class="text-2xl font-serif text-primario mb-3">Tareas pendientes</h2>
        <ul id="elemento" class="space-y-3"></ul>

    </section>

    <script src="app.js"></script>
</body>
</html>
