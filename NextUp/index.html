<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Metadatos básicos del documento (codificación y responsive) -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Hoja de estilos generada/compilada (por ejemplo Tailwind -> output.css) -->
    <link rel="stylesheet" href="styles/output.css">
    <!-- Componentes (menos Tailwind en HTML/JS) -->
    <link rel="stylesheet" href="styles/components.css">
    <!-- Estilos específicos del toggle de tema -->
    <link rel="stylesheet" href="styles/theme-toggle.css">

    <!-- Ajustes puntuales de layout (sin depender de Tailwind build) -->
    <style>
      /* Popups: mostrar como flex solo al quitar `.hidden` */
      .popup-root { display: none; }
      .popup-root:not(.hidden) { display: flex; }

      /* Fondo atenuado y ocultar toggle en móvil */
      .has-popup body > *:not(.popup-root) { filter: brightness(0.35); }
      @media (max-width: 768px) { .has-popup #theme-toggle { display: none; } }

      /* Accesibilidad: link para saltar al contenido */
      .skip-link {
        position: absolute;
        left: 0.75rem;
        top: 0.75rem;
        transform: translateY(-200%);
        padding: 0.5rem 0.75rem;
        border-radius: 0.5rem;
        background: white;
        color: #0D47A1;
        box-shadow: 0 8px 20px rgba(15, 23, 42, 0.15);
        z-index: 60;
      }
      .skip-link:focus { transform: translateY(0); outline: 2px solid #1E88E5; outline-offset: 2px; }

    </style>

    <!-- Título que aparece en la pestaña del navegador -->
    <title>NextUp</title>
</head>

<!--
    Estructura general
    - Usamos la clase `dark` en el elemento <html> para activar estilos "dark:" (Tailwind).
    - En <body> definimos fondo, color de texto, tipografía y layout general centrado.
-->
<body class="bg-[#E3F2FD] dark:bg-slate-900 text-texto dark:text-slate-100 font-sans min-h-screen flex flex-col items-center">
    <a class="skip-link" href="#main">Saltar al contenido</a>

    <!-- Encabezado fijo de la app: contiene el nombre/branding -->
    <header class="w-full py-6 shadow-md flex justify-center items-center">
        <!-- Título principal visible -->
        <h1 class="text-5xl font-serif text-primario dark:text-blue-300">NextUp</h1>
    </header>

    <!-- Bloque de prueba (comentado). Útil para verificar dark mode rápidamente. -->
    <!--<div class="bg-white dark:bg-black text-black dark:text-white p-10">
        TEST DARK MODE
    </div> -->

    <!-- Contenedor principal: proyectos + tareas (responsive, ancho contenido como antes) -->
    <main id="main" class="card-app">

        <!--
            Botón de tema (modo claro/oscuro)
            - `id="theme-toggle"`: lo usa el script para escuchar el click y actualizar el texto.
            - `fixed top-4 right-4`: lo fija en la esquina superior derecha, fuera del flujo normal.
        -->
    <button
        id="theme-toggle"
        class="theme-toggle-btn"
    >
        <!-- Texto del botón (en móvil se oculta por CSS) -->
        <span id="theme-toggle-text">Modo oscuro</span>
        <!--
            Icono del botón (solo visible en móvil):
            - Es un <span> con máscara CSS (no un <img>) para poder "tintar" el icono.
            - data-icon alterna entre "moon" y "sun" según el tema actual.
        -->
        <span
            id="theme-toggle-icon"
            data-icon="moon"
            aria-hidden="true"
        ></span>
    </button>

        <!-- Layout: sidebar proyectos (md+) + contenido tareas -->
        <div class="layout">
            <!-- Sidebar proyectos (visible en escritorio) -->
            <aside class="hidden md:block md:w-64">
                <div class="flex items-center justify-between gap-3 mb-3">
                    <h2 class="section-title">Proyectos</h2>
                    <button id="project-add" type="button" class="btn btn-ghost ml-1">
                        + Proyecto
                    </button>
                </div>
                <ul id="project-list" class="list-panel"></ul>
            </aside>

            <!-- Contenido principal -->
            <main class="flex-1 min-w-0">
                <!-- Barra superior (móvil): selector de proyectos + nombre proyecto activo -->
                <div class="md:hidden mb-6">
                    <label for="project-select-mobile" class="sr-only">Proyecto</label>
                    <select
                        id="project-select-mobile"
                        class="field w-full project-select-mobile"
                        aria-label="Seleccionar proyecto"
                    ></select>
                </div>

                <!-- Buscador: filtra tareas (la lógica suele estar en `app.js`) -->
                <section id="search-section">
                    <h2 class="section-title">Buscar</h2>
                    <input 
                        type="text" 
                        id="search" 
                        placeholder="Buscar..."
                        class="field mb-8"
                    >
                </section>

                <!-- Formulario para añadir una tarea nueva -->
                <h2 class="section-title">Añadir tarea</h2>
                <form id="formulario" class="mb-8">
                    <input 
                        type="text" 
                        id="entrada" 
                        placeholder="Nueva tarea..." 
                        required
                        class="field w-full"
                    >
                </form>

                <!-- Lista donde se renderizan las tareas pendientes -->
                <section id="pending-section">
                    <div class="flex items-center justify-between gap-3 mb-3">
                        <h2 id="pending-heading" class="section-title">Tareas pendientes</h2>
                        <div class="hidden md:block min-w-0 text-right">
                            <div class="text-xs uppercase tracking-wide text-slate-600 dark:text-slate-300">Proyecto</div>
                            <div id="active-project-name-desktop" class="font-semibold truncate">—</div>
                        </div>
                    </div>
                    <ul id="elemento" class="task-list" aria-label="Tareas pendientes"></ul>
                </section>

                <!-- Completadas (solo sesión) -->
                <h2 id="completed-heading" class="section-title mt-8">Tareas completadas</h2>
                <ul id="completed" class="task-list" aria-label="Tareas completadas"></ul>
            </main>
        </div>

    </main>

    <!-- Drawer de proyectos (móvil) -->
    <div id="project-drawer" class="popup-root fixed inset-0 hidden z-40 items-center justify-center">
        <div id="project-drawer-backdrop" class="absolute inset-0 bg-black/40"></div>
            <div id="project-drawer-content" class="popup-panel">
                <div class="row mb-6 w-full">
                    <h2 class="section-title mb-0">Proyectos</h2>
                    <button
                        id="project-drawer-close"
                        type="button"
                        class="ml-auto text-2xl leading-none font-semibold text-primario dark:text-blue-300 hover:opacity-80 transition"
                        aria-label="Cerrar"
                    >
                        ×
                    </button>
                </div>
                <button id="project-add-mobile" type="button" class="btn btn-ghost mb-4">
                    + Proyecto
                </button>
                <ul id="project-list-mobile" class="list-panel overflow-auto" aria-label="Lista de proyectos"></ul>
        </div>
    </div>

    <!-- Modal centrado: crear proyecto -->
    <div id="project-modal" class="popup-root fixed inset-0 hidden z-50 items-center justify-center">
        <div id="project-modal-backdrop" class="absolute inset-0 bg-black/40"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4">
            <div id="project-modal-panel" class="popup-panel popup-panel--modal">
                <h2 id="project-modal-title" class="section-title mb-0">Crear proyecto</h2>
                <form id="project-modal-form" class="stack">
                    <input
                        id="project-modal-input"
                        type="text"
                        autocomplete="off"
                        placeholder="Nombre del proyecto..."
                        class="field"
                    >
                    <div class="row justify-end mt-2">
                        <button id="project-modal-cancel" type="button" class="btn btn-ghost">
                            Cancelar
                        </button>
                        <button id="project-modal-submit" type="submit" class="btn btn-primary">
                            Crear
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal centrado: mover tarea -->
    <div id="move-task-modal" class="popup-root fixed inset-0 hidden z-50 items-center justify-center">
        <div id="move-task-modal-backdrop" class="absolute inset-0 bg-black/40"></div>
        <div
            id="move-task-modal-panel"
            class="popup-panel popup-panel--modal"
        >
            <h2 class="section-title mb-0">Mover tarea</h2>
            <div
                id="move-task-modal-taskname"
                class="text-sm text-slate-600 dark:text-slate-300 truncate"
            >
                —
            </div>
            <div
                id="move-task-modal-list"
                class="stack max-h-[45vh] overflow-auto"
            ></div>
            <div id="move-task-modal-actions" class="row justify-end">
                <button id="move-task-modal-cancel" type="button" class="btn btn-ghost">
                    Cancelar
                </button>
                <button id="move-task-modal-confirm" type="button" class="btn btn-primary">
                    Mover
                </button>
            </div>
        </div>
    </div>

    <!-- Script principal de la app (tareas, renderizado, eventos, etc.) -->
    <script src="src/theme.js" defer></script>
    <script src="src/app.js" defer></script>
</body>
</html>
