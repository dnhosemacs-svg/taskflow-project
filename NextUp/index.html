<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Metadatos básicos del documento (codificación y responsive) -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Hoja de estilos generada/compilada (por ejemplo Tailwind -> output.css) -->
    <link rel="stylesheet" href="output.css">

    <!--
        Estilos específicos para el botón de cambio de tema (responsivo)
        Cambios clave:
        - En pantallas pequeñas (smartphone) ocultamos el texto y mostramos un icono.
        - El icono es "tintable" usando máscara CSS (mask-image), para poder darle colores exactos
          de la paleta de la web sin modificar los SVG originales.
        - En móvil el botón se vuelve plano (sin borde/fondo/sombra) para que se vea solo el icono.
    -->
    <style>
        /* Layout del botón: texto + icono en línea */
        #theme-toggle {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        #theme-toggle-icon {
            width: 20px;
            height: 20px;
            display: none; /* por defecto oculto, se controla por media queries */
            /*
                Icono tintable (mask):
                - En vez de <img>, usamos un <span> con mask-image.
                - El color lo pone background-color, así se adapta a la paleta.
                - data-icon elige qué SVG usar como máscara.
            */
            background-color: var(--icon-color, currentColor);
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-position: center;
            mask-position: center;
            -webkit-mask-size: contain;
            mask-size: contain;
        }

        /* Colores requeridos por icono (según lo pedido) */
        /* Luna (cuando NO está en dark): mismo color que el fondo en dark mode */
        #theme-toggle-icon[data-icon="moon"] {
            --icon-color: var(--color-slate-900);
            -webkit-mask-image: url("Imagenes/moon-fill.svg");
            mask-image: url("Imagenes/moon-fill.svg");
        }

        /* Sol (cuando SÍ está en dark): mismo color que el h1 (dark:text-blue-300) */
        #theme-toggle-icon[data-icon="sun"] {
            --icon-color: var(--color-blue-300);
            -webkit-mask-image: url("Imagenes/sun-fill.svg");
            mask-image: url("Imagenes/sun-fill.svg");
        }

        /* En pantallas pequeñas (smartphones) se muestra solo el icono */
        @media (max-width: 640px) {
            /*
                En móvil: el botón se vuelve "plano"
                (sin borde, sin fondo, sin sombra, sin padding).
                Así el usuario ve únicamente el icono en la esquina.
            */
            #theme-toggle {
                border: none;
                background: transparent;
                box-shadow: none;
                padding: 0;
            }

            /* En móvil ocultamos el texto y mostramos el icono */
            #theme-toggle-text {
                display: none;
            }

            #theme-toggle-icon {
                display: inline-block;
            }
        }

        /* En pantallas más grandes se muestra solo el texto */
        @media (min-width: 641px) {
            /* En escritorio/tablet: texto visible, icono oculto */
            #theme-toggle-text {
                display: inline;
            }

            #theme-toggle-icon {
                display: none;
            }
        }
    </style>

    <!-- Título que aparece en la pestaña del navegador -->
    <title>NextUp</title>
</head>

<!--
    Estructura general
    - Usamos la clase `dark` en el elemento <html> para activar estilos "dark:" (Tailwind).
    - En <body> definimos fondo, color de texto, tipografía y layout general centrado.
-->
<body class="bg-[#E3F2FD] dark:bg-slate-900 text-texto dark:text-slate-100 font-sans min-h-screen flex flex-col items-center">

    <!-- Encabezado fijo de la app: contiene el nombre/branding -->
    <header class="w-full py-6 shadow-md flex justify-center items-center">
        <!-- Título principal visible -->
        <h1 class="text-5xl font-serif text-primario dark:text-blue-300">NextUp</h1>
    </header>

    <!-- Bloque de prueba (comentado). Útil para verificar dark mode rápidamente. -->
    <!--<div class="bg-white dark:bg-black text-black dark:text-white p-10">
        TEST DARK MODE
    </div> -->

    <!-- Contenedor principal: agrupa buscador, formulario de alta y lista de tareas -->
    <section class="bg-white dark:bg-slate-800 max-w-xl w-full mt-10 p-8 rounded-xl shadow-lg">

        <!--
            Botón de tema (modo claro/oscuro)
            - `id="theme-toggle"`: lo usa el script para escuchar el click y actualizar el texto.
            - `fixed top-4 right-4`: lo fija en la esquina superior derecha, fuera del flujo normal.
        -->
    <button
        id="theme-toggle"
        class="fixed top-4 right-4 px-3 py-1 rounded-md border-2 border-primario rounded-lg dark:border-slate-600
               bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-100
               shadow hover:bg-slate-200 dark:hover:bg-slate-700 transition z-50"
    >
        <!-- Texto del botón (en móvil se oculta por CSS) -->
        <span id="theme-toggle-text">Modo oscuro</span>
        <!--
            Icono del botón (solo visible en móvil):
            - Es un <span> con máscara CSS (no un <img>) para poder "tintar" el icono.
            - data-icon alterna entre "moon" y "sun" según el tema actual.
        -->
        <span
            id="theme-toggle-icon"
            data-icon="moon"
            aria-hidden="true"
        ></span>
    </button>

        <!-- Buscador: filtra tareas (la lógica suele estar en `app.js`) -->
        <h2 class="text-2xl font-serif text-primario dark:text-blue-300 mb-3">Barra de búsqueda</h2>
        <!-- `id="search"`: lo usa el JS para leer lo que escribe el usuario y filtrar -->
        <input 
            type="text" 
            id="search" 
            placeholder="Buscar..."
            class="w-full px-4 py-2 border-2 border-primario rounded-lg bg-white dark:bg-slate-700 
                   text-texto dark:text-slate-100 shadow-sm focus:border-texto focus:bg-[#E3F2FD] 
                   dark:focus:bg-slate-600 transition mb-8"
        >

        <!-- Formulario para añadir una tarea nueva -->
        <h2 class="text-2xl font-serif text-primario dark:text-blue-300 mb-3">Añadir tarea</h2>

        <!--
            `id="formulario"`: el JS intercepta el submit para crear la tarea sin recargar la página.
            El layout `flex` coloca input + botón en una misma fila.
        -->
        <form id="formulario" class="flex items-center gap-3 mb-8">
            <!-- `id="entrada"`: campo donde se escribe el texto de la tarea -->
            <input 
                type="text" 
                id="entrada" 
                placeholder="Nueva tarea..." 
                required
                class="flex-1 px-4 py-2 border-2 border-primario rounded-lg bg-white dark:bg-slate-700 
                       text-texto dark:text-slate-100 shadow-sm focus:border-texto focus:bg-[#E3F2FD] 
                       dark:focus:bg-slate-600 transition"
            >

            <!-- Botón de envío del formulario: al hacer click dispara el submit -->
            <button type="submit" class="w-[30px] h-[30px] bg-primario rounded-full flex items-center justify-center shadow-md hover:bg-blue-900 transition">
                <!-- Icono del botón (imagen local). El alt mejora accesibilidad. -->
                <img src="Imagenes/BotonAñadir.png" alt="Añadir" class="w-[22px] h-[22px] rounded-full">
            </button>
        </form>

        <!-- Lista donde se renderizan las tareas pendientes -->
        <h2 class="text-2xl font-serif text-primario dark:text-blue-300 mb-3">Tareas pendientes</h2>
        <!-- `id="elemento"`: el JS inserta aquí los <li> de cada tarea -->
        <ul id="elemento" class="space-y-3 p-3 rounded-lg bg-white dark:bg-slate-800 text-[#111827] dark:text-[#F9FAFB]"></ul>

    </section>

    <!--
        Script de tema (dark mode)
        - Decide el tema inicial usando localStorage o preferencia del sistema.
        - Alterna la clase `dark` en <html> para activar estilos `dark:*`.
    -->
    <script>
        // Referencia al elemento <html> (donde se añade/quita la clase `dark`)
        const html = document.documentElement;
        // Botón que el usuario pulsa para alternar el tema
        const toggleBtn = document.getElementById('theme-toggle');

        // Leer preferencia guardada (si existe)
        const storedTheme = localStorage.getItem('theme');

        if (storedTheme === 'dark') {
            html.classList.add('dark');
        } else if (storedTheme === 'light') {
            html.classList.remove('dark');
        } else {
            // Si no hay preferencia guardada, usar la del sistema operativo/navegador
            if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                html.classList.add('dark');
            }
        }

        // Referencias al contenido interno del botón (texto + icono)
        // Nota: el icono es un <span> con data-icon, no un <img>, para controlar color por CSS.
        const toggleText = document.getElementById('theme-toggle-text');
        const toggleIcon = document.getElementById('theme-toggle-icon');

        // Actualiza el texto, el icono (data-icon) y la etiqueta accesible del botón
        function updateButtonContent() {
            const isDark = html.classList.contains('dark');

            if (toggleText) {
                toggleText.textContent = isDark ? 'Modo claro' : 'Modo oscuro';
            }

            if (toggleIcon) {
                // Cambiamos el "tipo" de icono; el CSS decide el SVG (mask-image) y su color.
                toggleIcon.dataset.icon = isDark ? 'sun' : 'moon';
            }

            // Accesibilidad: aunque en móvil se oculte el texto, el botón mantiene etiqueta
            toggleBtn.setAttribute('aria-label', isDark ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro');
        }

        updateButtonContent();

        // Alternar tema al hacer click y persistir la elección
        toggleBtn.addEventListener('click', () => {
            const isDark = html.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateButtonContent();
        });
    </script>

    <!-- Script principal de la app (tareas, renderizado, eventos, etc.) -->
    <script src="app.js"></script>
</body>
</html>
